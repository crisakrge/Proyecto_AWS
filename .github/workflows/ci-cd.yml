name: CI/CD Pipeline

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  test:  # Job de pruebas (CI)
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip' # Optimiza las corridas subsiguientes

    - name: Upgrade pip and setuptools
      run: |
        python -m pip install --upgrade pip setuptools

    - name: Install dependencies
      run: |
        # Instalamos Flask/Werkzeug y luego el resto de requirements
        python -m pip install --upgrade pip
        # Instalamos versiones compatibles para evitar el error de url_quote
        pip install Flask==2.2.5 Werkzeug==2.2.3
        pip install -r requirements.txt

    - name: Run tests
      run: |
        pytest

  deploy:  # Job de despliegue (CD)
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/master' && success()

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: 'us-east-2'

    - name: Install Elastic Beanstalk CLI
      run: |
        python -m pip install --upgrade pip
        pip install awsebcli

    - name: Initialize and Deploy to Elastic Beanstalk
      run: |
        # Forzamos el uso de la plataforma Python 3.11 (Amazon Linux 2023)
        eb init -p "Python 3.11" proyecto-aws --region us-east-2
        eb deploy --timeout 20m