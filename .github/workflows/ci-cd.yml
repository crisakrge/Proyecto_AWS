name: CI/CD Pipeline

on:
  push:
    branches:
      - master  # O la rama que uses para producción
  pull_request:
    branches:
      - master  # También se ejecutará en pull requests

jobs:
  test:  # Job de pruebas (CI)
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Set up Python
      uses: actions/setup-python@v2
      with:
        python-version: '3.8'  # Usa la versión de Python que necesites

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run tests
      run: |
        pytest  # Este comando ejecutará las pruebas con pytest

  deploy:  # Job de despliegue (CD)
    runs-on: ubuntu-latest
    needs: test  # El despliegue solo se ejecuta si las pruebas son exitosas
    if: success()  # Solo se ejecuta si las pruebas anteriores fueron exitosas

    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Set up AWS CLI
      uses: aws-actions/configure-aws-credentials@v1
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: 'us-east-2'  # Cambia por tu región de AWS

    - name: Install Elastic Beanstalk CLI
      run: |
        pip install awsebcli

    - name: Deploy to Elastic Beanstalk
      run: |
        eb deploy
